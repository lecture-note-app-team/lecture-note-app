<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>マインドマップ | 講義ノートメーカー</title>
  <link rel="stylesheet" href="./style.css?v=1" />
</head>
<body>
  <a href="#" id="backLink">← ノートに戻る</a>

  <h1 id="noteTitle">マインドマップ</h1>
  <div class="small" id="statusLine">読み込み中…</div>

  <div class="card">
    <div class="mindmap-toolbar">
      <button id="btnGenerate" type="button">AIで自動生成（本文から）</button>
      <button id="btnAddNode" type="button">ノードを追加</button>
      <button id="btnDeleteNode" type="button">選択ノードを削除</button>
      <button id="btnRenameNode" type="button">ラベルを編集</button>
      <button id="btnSave" type="button">保存</button>
      <span class="small" id="hintLine">ノードはドラッグで移動できます。クリックで選択してから「追加/削除/編集」を使います。</span>
    </div>

    <div id="canvasWrap" class="mindmap-canvas-wrap">
      <div id="canvasInner" class="mindmap-canvas-inner">
        <svg id="svgLayer" class="mindmap-svg-layer"></svg>
        <div id="nodeLayer"></div>
      </div>
    </div>
  </div>

  <script src="./mindmap.js?v=1"></script>
</body>
</html>
