<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>マイページ | 講義ノートメーカー</title>
  <link rel="stylesheet" href="./style.css?v=5" />
</head>
<body>
  <a href="/">← トップへ</a> / <a href="/login.html">ログインページ</a>
  <h1>マイページ</h1>

  <div class="card">
    <h2>ログイン状態</h2>
    <div id="me">読み込み中…</div>
  </div>

  <div class="row" style="margin-top:10px;">
    <button id="btnLogout">ログアウト</button>
    <button id="btnDeleteAccount">アカウント削除（退会）</button>
    <a href="/create-quiz.html" class="button-link">クイズ作成</a>
    <a href="/my-quizzes.html" class="button-link">作成クイズ一覧</a>
  </div>

  <div class="card" id="billingCard">
    <div class="row" style="justify-content:space-between; align-items:flex-start;">
      <div>
        <h2 style="margin-bottom:6px;">プラン・課金情報</h2>
        <div class="small">無料/有料の状態と、今月の利用状況を確認できます。</div>
      </div>
      <button id="btnReloadBilling">更新</button>
    </div>
    <div id="billingMessage" class="small" style="margin-top:8px;">読み込み中…</div>

    <div id="billingUsageGrid" class="billing-grid" style="margin-top:12px;"></div>

    <div class="row" style="margin-top:12px;">
      <button id="btnSubscribePro" class="btn-pro">Proプランに登録</button>
      <button id="btnOpenPortal">請求管理を開く</button>
      <button id="btnCancelSubscription" class="btn-cancel">解約する</button>
    </div>
  </div>

  <div class="card">
    <h2>自分のノート</h2>
    <section class="calendar-panel">
      <div class="calendar-header">
        <button id="btnMyPrevMonth" type="button">前月</button>
        <div id="myMonthLabel" class="calendar-month-label"></div>
        <button id="btnMyNextMonth" type="button">次月</button>
      </div>
      <div id="myCalendar" class="calendar-grid"></div>
      <div id="mySelectedDate" class="selected-date-indicator">対象日: 未選択</div>
      <div id="myDayCountSummary" class="small"></div>
    </section>
    <section class="filter-panel" id="myFilterSection">
      <h3>検索・並び替え</h3>
      <div id="myFilterHint" class="small">日付を選択すると検索・並び替えが有効になります。</div>
      <div class="grid-2">
        <div>
          <label for="mySearchInput">検索</label>
          <input id="mySearchInput" type="search" placeholder="タイトル・本文・タグなどで検索" />
        </div>
        <div>
          <label for="mySortSelect">並び替え</label>
          <select id="mySortSelect">
            <option value="desc">新しい順</option>
            <option value="asc">古い順</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btnClearMyDate" type="button">日付解除</button>
      </div>
    </section>
    <div id="myList">読み込み中…</div>
  </div>

  <div class="card">
    <h2>コミュニティ内ノート</h2>
    <section class="calendar-panel">
      <div class="calendar-header">
        <button id="btnCommunityPrevMonth" type="button">前月</button>
        <div id="communityMonthLabel" class="calendar-month-label"></div>
        <button id="btnCommunityNextMonth" type="button">次月</button>
      </div>
      <div id="communityCalendar" class="calendar-grid"></div>
      <div id="communitySelectedDate" class="selected-date-indicator">対象日: 未選択</div>
      <div id="communityDayCountSummary" class="small"></div>
    </section>
    <section class="filter-panel" id="communityFilterSection">
      <h3>検索・並び替え</h3>
      <div id="communityFilterHint" class="small">日付を選択すると検索・並び替えが有効になります。</div>
      <div class="grid-2">
        <div>
          <label for="communitySearchInput">検索</label>
          <input id="communitySearchInput" type="search" placeholder="タイトル・本文・タグなどで検索" />
        </div>
        <div>
          <label for="communitySortSelect">並び替え</label>
          <select id="communitySortSelect">
            <option value="desc">新しい順</option>
            <option value="asc">古い順</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btnClearCommunityDate" type="button">日付解除</button>
      </div>
    </section>
    <div id="communityList">読み込み中…</div>
  </div>

  <div class="card" style="margin-top:12px;">
    <div class="row2" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <h2 style="margin:0;">参加中コミュニティ</h2>
      <button id="btnReloadCommunities">更新</button>
    </div>
    <div class="small" style="margin-top:6px;">
      ※ 管理者だけ「削除（解散）」ができます。
    </div>
    <ul id="communitiesList" class="list" style="margin:8px 0 0; padding-left:18px;"></ul>
  </div>

  <div class="card" style="margin-top:12px;">
    <h2 style="margin:0 0 10px;">参加申請の承認</h2>
    <div id="joinRequestApprovals"></div>
  </div>

  <script src="./mypage.js?v=3"></script>
</body>
</html>
